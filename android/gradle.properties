# this file conttains performance settings for gradle

#org.gradle.jvmarg: how much memory gradle can use
# -Xmx4G means "use up to 4 Gigabytes of RAM"
#this speeds up the build process
org.gradle.jvmargs=-Xmx4G

# android.useAndroidX: Use AndroidX libraries (modern android libraries)
# true means use newer AndroidX instead of ald support libraries
android.useAndroidX=true

#android.enableJetifier: Convert old libraries to AndroidX
#true means automatically old libraries
android.enableJetifier=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
